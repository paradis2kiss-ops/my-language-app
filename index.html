<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Master Engine V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .bookmark-active { color: #facc15 !important; } /* 별표 활성화 색상 */
    </style>
</head>
<body class="pb-32">
    <header class="p-8 pt-12 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tighter italic">2026 Master <span class="text-blue-400">V2</span></h1>
            <p class="text-slate-500 text-xs mt-2 font-mono">SYSTEM: RANDOM & BOOKMARK</p>
        </div>
        <button onclick="toggleBookmarkView()" class="p-3 bg-slate-800 rounded-2xl text-yellow-400 border border-white/10">
            <i class="fa-solid fa-star"></i>
        </button>
    </header>

    <main id="main-container" class="px-6 space-y-6">
        <div id="loader" class="text-center py-20 text-slate-600 font-bold animate-pulse">SYNCING CLOUD...</div>
    </main>

    <button onclick="location.reload()" class="fixed bottom-10 right-6 w-16 h-16 bg-blue-600 rounded-full shadow-2xl flex items-center justify-center active:rotate-180 transition duration-500 z-50">
        <i class="fa-solid fa-rotate text-white text-2xl"></i>
    </button>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5bBv7_SonmFxuArnlAaaie8EHDS4Px6ZF1uY3q1Mqcbgfgac-4V7D0CxSVwCOy4zQXog3FT8QzKpj/pub?output=csv';
        let allData = [];
        let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');

        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1);

                allData = rows.map(row => {
                    const cols = row.split(',');
                    return { 
                        type: cols[0]?.trim(), 
                        text: cols[1]?.trim(), 
                        sub: cols[2]?.trim(), 
                        lang: cols[3]?.trim(), 
                        color: cols[4]?.trim() || 'slate' 
                    };
                }).filter(item => item.text);

                renderRandom();
            } catch (e) {
                document.getElementById('loader').innerText = "CHECK CSV URL";
            }
        }

        function renderRandom() {
            const shuffled = [...allData].sort(() => Math.random() - 0.5);
            renderCards(shuffled.slice(0, 4));
        }

        function renderCards(items) {
            const container = document.getElementById('main-container');
            container.innerHTML = '';
            items.forEach(item => {
                const isBookmarked = bookmarks.some(b => b.text === item.text);
                const card = document.createElement('div');
                card.className = `glass-card p-6 border-l-4 border-${item.color}-500/50 relative`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black tracking-widest text-${item.color}-400 uppercase">${item.type}</span>
                        <div class="flex space-x-2">
                            <button onclick="toggleBookmark('${encodeURIComponent(JSON.stringify(item))}', this)" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center ${isBookmarked ? 'bookmark-active' : 'text-slate-500'}">
                                <i class="fa-solid fa-star text-xs"></i>
                            </button>
                            <button onclick="speak(\`${item.text}\`, '${item.lang}')" class="w-10 h-10 rounded-xl bg-${item.color}-500/20 text-${item.color}-400 flex items-center justify-center">
                                <i class="fa-solid fa-play"></i>
                            </button>
                        </div>
                    </div>
                    <p class="text-lg font-bold leading-tight mb-2">"${item.text}"</p>
                    <p class="text-[11px] text-slate-500 font-medium">${item.sub}</p>
                `;
                container.appendChild(card);
            });
        }

        function toggleBookmark(itemStr, btn) {
            const item = JSON.parse(decodeURIComponent(itemStr));
            const index = bookmarks.findIndex(b => b.text === item.text);
            if (index > -1) {
                bookmarks.splice(index, 1);
                btn.classList.remove('bookmark-active');
            } else {
                bookmarks.push(item);
                btn.classList.add('bookmark-active');
            }
            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
        }

        function toggleBookmarkView() {
            if (bookmarks.length === 0) { alert("저장된 문장이 없습니다!"); return; }
            renderCards(bookmarks);
            document.getElementById('engine-status').innerText = "VIEWING BOOKMARKS";
        }

        function speak(text, lang) {
    window.speechSynthesis.cancel(); // 이전 음성 취소
    const utterance = new SpeechSynthesisUtterance(text);
    
    // 브라우저의 목소리 목록 가져오기
    const voices = window.speechSynthesis.getVoices();
    
    if (lang === 'en-GB') {
        // 엠마 스톤 스타일 (영국 여성) 찾기
        const emmaVoice = voices.find(v => v.lang === 'en-GB' && v.name.includes('Female')) 
                         || voices.find(v => v.lang === 'en-GB');
        if (emmaVoice) utterance.voice = emmaVoice;
        utterance.rate = 0.85; 
        utterance.pitch = 0.9; 
    } else {
        utterance.lang = lang || 'en-US';
        utterance.rate = 0.9;
    }
    
    window.speechSynthesis.speak(utterance);
}

// 중요: 목소리 목록 로딩 보장
window.speechSynthesis.onvoiceschanged = () => {
    window.speechSynthesis.getVoices();
};
    </script>
</body>
</html>
