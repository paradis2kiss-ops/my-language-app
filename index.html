<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Master Engine V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(30,41,59,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; transition: all 0.3s ease; }
        .bookmark-active { color: #facc15 !important; }
        .voice-btn { transition: all 0.2s; white-space: nowrap; }
        .voice-btn:active { transform: scale(0.9); }
        .uk-panel { max-height: 0; overflow: hidden; transition: max-height 0.35s ease, opacity 0.35s ease; opacity: 0; }
        .uk-panel.open { max-height: 130px; opacity: 1; }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: rgba(99,102,241,0.3); outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #818cf8; cursor: pointer; }
        /* 탭 */
        .main-tab { transition: all 0.2s; }
        .main-tab.active { background: rgba(37,99,235,0.25); color: #93c5fd; border-color: rgba(37,99,235,0.5); }
        .main-tab:not(.active) { color: #475569; border-color: rgba(255,255,255,0.08); }
        /* 과목 필터 */
        .sub-filter { transition: all 0.2s; font-size: 11px; white-space: nowrap; }
        .sub-filter.active { color: white; }
        .sub-filter:not(.active) { opacity: 0.4; }
        /* 플래시카드 */
        .flashcard-container { perspective: 1000px; }
        .flashcard { width: 100%; min-height: 350px; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); cursor: pointer; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; text-align: center; border-radius: 1.5rem; }
        .flashcard-front { background: rgba(59,130,246,0.1); backdrop-filter: blur(12px); border: 2px solid rgba(59,130,246,0.4); }
        .flashcard-back { background: rgba(34,197,94,0.1); backdrop-filter: blur(12px); border: 2px solid rgba(34,197,94,0.4); transform: rotateY(180deg); }
        /* 업로드 모달 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 1.5rem; max-width: 90%; width: 500px; max-height: 80vh; overflow-y: auto; }
        .upload-area { border: 2px dashed rgba(99,102,241,0.3); border-radius: 1rem; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: rgba(99,102,241,0.6); background: rgba(99,102,241,0.05); }
        .upload-area.dragover { border-color: #6366f1; background: rgba(99,102,241,0.1); }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 pt-10 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tighter italic uppercase">2026 Master <span class="text-blue-400">V2</span></h1>
            <p id="engine-status" class="text-slate-500 text-xs mt-1 font-mono tracking-widest">SYSTEM: CLOUD SYNCED</p>
        </div>
        <div class="flex gap-2">
            <button id="upload-btn" onclick="openUploadModal()" class="w-12 h-12 bg-slate-800/50 rounded-2xl text-green-400 border border-white/10 flex items-center justify-center shadow-lg hover:bg-slate-700/50 transition" style="display:none;">
                <i class="fa-solid fa-upload"></i>
            </button>
            <button onclick="toggleBookmarkView()" class="w-12 h-12 bg-slate-800/50 rounded-2xl text-yellow-400 border border-white/10 flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-star"></i>
            </button>
        </div>
    </header>

    <!-- 메인 탭 -->
    <div class="px-6 mb-3 flex gap-2">
        <button id="tab-lang" onclick="switchMainTab('lang')"
            class="main-tab active flex-1 py-2.5 rounded-xl border text-sm font-bold tracking-wide">
            🌏 언어
        </button>
        <button id="tab-cert" onclick="switchMainTab('cert')"
            class="main-tab flex-1 py-2.5 rounded-xl border text-sm font-bold tracking-wide">
            📚 자격증
        </button>
        <button id="tab-flash" onclick="switchMainTab('flash')"
            class="main-tab flex-1 py-2.5 rounded-xl border text-sm font-bold tracking-wide">
            🎴 카드
        </button>
    </div>

    <!-- 자격증 과목 필터 (자격증 탭일 때만 표시) -->
    <div id="cert-filters" class="px-6 mb-4 hidden">
        <div class="flex gap-2 overflow-x-auto pb-1">
            <button onclick="switchSubject('ALL')" data-subject="ALL"
                class="sub-filter active bg-slate-700 text-white px-3 py-1.5 rounded-lg font-bold">전체</button>
            <button onclick="switchSubject('SQLD')" data-subject="SQLD"
                class="sub-filter bg-indigo-900/40 text-indigo-300 px-3 py-1.5 rounded-lg font-bold">SQLD</button>
            <button onclick="switchSubject('사조사')" data-subject="사조사"
                class="sub-filter bg-violet-900/40 text-violet-300 px-3 py-1.5 rounded-lg font-bold">사조사</button>
            <button onclick="switchSubject('정처기')" data-subject="정처기"
                class="sub-filter bg-blue-900/40 text-blue-300 px-3 py-1.5 rounded-lg font-bold">정처기</button>
            <button onclick="switchSubject('빅분기')" data-subject="빅분기"
                class="sub-filter bg-rose-900/40 text-rose-300 px-3 py-1.5 rounded-lg font-bold">빅분기</button>
            <button onclick="switchSubject('파이썬')" data-subject="파이썬"
                class="sub-filter bg-green-900/40 text-green-300 px-3 py-1.5 rounded-lg font-bold">파이썬</button>
            <button onclick="switchSubject('분류학')" data-subject="분류학"
                class="sub-filter bg-amber-900/40 text-amber-300 px-3 py-1.5 rounded-lg font-bold">분류학</button>
        </div>
    </div>

    <!-- 플래시카드 컨트롤 -->
    <div id="flash-controls" class="px-6 mb-4 hidden">
        <div class="flex gap-2 items-center justify-between glass-card p-3 rounded-xl">
            <div class="text-sm font-bold text-slate-300">
                <span id="flash-progress">0</span> / <span id="flash-total">0</span>
            </div>
            <div class="flex gap-2">
                <button onclick="prevFlashCard()" class="px-3 py-1.5 bg-slate-700/50 text-slate-300 rounded-lg text-sm font-bold hover:bg-slate-700 transition">
                    ← 이전
                </button>
                <button onclick="nextFlashCard()" class="px-3 py-1.5 bg-blue-600/50 text-blue-300 rounded-lg text-sm font-bold hover:bg-blue-600 transition">
                    다음 →
                </button>
            </div>
        </div>
    </div>

    <main id="main-container" class="px-6 space-y-5">
        <div class="flex items-center justify-center" style="min-height:50vh">
            <p class="text-slate-600 font-bold tracking-[0.2em] animate-pulse">SYNCING CLOUD DATA...</p>
        </div>
    </main>

    <!-- CSV 업로드 모달 -->
    <div id="uploadModal" class="modal-overlay">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">📁 플래시카드 CSV 업로드</h2>
                <button onclick="closeUploadModal()" class="text-slate-400 hover:text-white text-2xl">×</button>
            </div>

            <div class="mb-4 p-3 bg-blue-900/20 border border-blue-500/30 rounded-lg text-xs text-blue-300">
                <strong>📋 CSV 형식:</strong><br>
                첫 번째 행은 헤더: Question,Answer,Category<br>
                예시)<br>
                "SQL WHERE절의 역할은?","조건에 맞는 행을 검색/필터링","SQLD"<br>
                "정보처리기사 시험 과목은?","계획 분석 설계 구현...","정처기"
            </div>

            <div id="uploadArea" class="upload-area mb-4">
                <i class="fa-solid fa-cloud-arrow-up text-3xl text-indigo-400 mb-2 block"></i>
                <p class="text-sm font-bold mb-1">CSV 파일을 드래그하거나 클릭</p>
                <p class="text-xs text-slate-400">최대 5MB</p>
                <input type="file" id="csvInput" accept=".csv" style="display:none" onchange="handleFileSelect(event)">
            </div>

            <button onclick="confirmUpload()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg transition">
                ✅ 확인 및 업로드
            </button>
        </div>
    </div>

    <button onclick="location.reload()" class="fixed bottom-10 right-6 w-16 h-16 bg-blue-600 rounded-full shadow-[0_0_20px_rgba(37,99,235,0.4)] flex items-center justify-center active:rotate-180 transition duration-500 z-50">
        <i class="fa-solid fa-rotate text-white text-2xl"></i>
    </button>

    <script>
        // ── 구글 시트 CSV URL ──────────────────────────────────────────
        const LANG_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5bBv7_SonmFxuArnlAaaie8EHDS4Px6ZF1uY3q1Mqcbgfgac-4V7D0CxSVwCOy4zQXog3FT8QzKpj/pub?gid=0&single=true&output=csv';
        const CERT_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5bBv7_SonmFxuArnlAaaie8EHDS4Px6ZF1uY3q1Mqcbgfgac-4V7D0CxSVwCOy4zQXog3FT8QzKpj/pub?gid=1184571085&single=true&output=csv';
        // ──────────────────────────────────────────────────────────────

        const CERT_SUBJECTS  = ['SQLD', '사조사', '정처기', '빅분기', '파이썬', '분류학'];
        const LANG_TYPES     = ['ENGLISH', 'JAPANESE', 'CHINESE', '한능검', 'DATA', '역사'];

        let langData     = [];
        let certData     = [];
        let flashData    = [];
        let currentTab   = 'lang';
        let currentSubject = 'ALL';
        let bookmarks    = JSON.parse(localStorage.getItem('bookmarks_v2') || '[]');
        let pendingCSVData = null;

        // 플래시카드 상태
        let flashCurrentIndex = 0;
        let flashReviewedCards = new Set();
        let flashCorrectCards = new Set();

        // ── CSV 파서 ──────────────────────────────────────────────────
        function parseCSVRow(row) {
            const result = []; let current = ''; let inQuotes = false;
            for (let i = 0; i < row.length; i++) {
                const ch = row[i];
                if (ch === '"') {
                    if (inQuotes && row[i+1] === '"') { current += '"'; i++; }
                    else inQuotes = !inQuotes;
                } else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                else current += ch;
            }
            result.push(current.trim());
            return result;
        }

        function cleanText(str) {
            if (!str) return '';
            return str.replace(/\*\*(.*?)\*\*/g, '$1').replace(/^"+|"+$/g, '').trim();
        }

        function parseCSV(csvText) {
            return csvText.split('\n').slice(1).map(row => {
                if (!row.trim()) return null;
                const cols = parseCSVRow(row);
                return { type: cleanText(cols[0])||'', text: cleanText(cols[1])||'', sub: cleanText(cols[2])||'', lang: (cols[3]||'ko-KR').trim(), color: (cols[4]||'blue').trim() };
            }).filter(item => item && item.text !== '');
        }

        function parseFlashCSV(csvText) {
            return csvText.split('\n').slice(1).map(row => {
                if (!row.trim()) return null;
                const cols = parseCSVRow(row);
                return {
                    front: cleanText(cols[0]) || '',
                    back: cleanText(cols[1]) || '',
                    category: cleanText(cols[2]) || 'General',
                    id: cleanText(cols[0])?.toLowerCase().replace(/\s+/g, '_') || ''
                };
            }).filter(item => item && item.front && item.back);
        }

        // ── 음성 ──────────────────────────────────────────────────────
        let cachedVoices = [];
        function loadVoices() { const v = window.speechSynthesis.getVoices(); if (v.length > 0) cachedVoices = v; }
        window.speechSynthesis.onvoiceschanged = loadVoices; loadVoices();

        function handleSpeak(text, lang) {
            window.speechSynthesis.cancel();
            const voices = cachedVoices.length > 0 ? cachedVoices : window.speechSynthesis.getVoices();
            const utt = new SpeechSynthesisUtterance(text);
            const l = (lang || 'ko-KR').trim();
            let voice = null;
            if (l.startsWith('en')) {
                voice = l === 'en-GB'
                    ? voices.find(v => v.name === 'Google UK English Female') || voices.find(v => v.lang === 'en-GB')
                    : voices.find(v => v.name === 'Google US English') || voices.find(v => v.lang === 'en-US');
                utt.rate = 0.82; utt.pitch = 1.0;
            } else if (l.startsWith('ja')) {
                voice = voices.find(v => v.name === 'Google 日本語') || voices.find(v => v.lang === 'ja-JP');
                utt.rate = 0.92; utt.pitch = 1.05;
            } else if (l.startsWith('zh')) {
                voice = voices.find(v => v.name === 'Google 普通话（中国大陆）') || voices.find(v => v.lang === 'zh-CN');
                utt.rate = 0.82; utt.pitch = 1.0;
            } else {
                voice = voices.find(v => v.name === 'Google 한국의') || voices.find(v => v.name === 'Microsoft Heami') || voices.find(v => v.lang === 'ko-KR');
                utt.rate = 1.0; utt.pitch = 1.0;
            }
            if (voice) utt.voice = voice;
            utt.lang = voice ? voice.lang : l;
            window.speechSynthesis.speak(utt);
        }

        function handleSpeakCustom(text, lang, rate, pitch) {
            window.speechSynthesis.cancel();
            const voices = cachedVoices.length > 0 ? cachedVoices : window.speechSynthesis.getVoices();
            const utt = new SpeechSynthesisUtterance(text);
            const voice = voices.find(v => v.name === 'Google UK English Female') || voices.find(v => v.lang === 'en-GB');
            if (voice) utt.voice = voice;
            utt.lang = 'en-GB'; utt.rate = rate; utt.pitch = pitch;
            window.speechSynthesis.speak(utt);
        }

        // ── 캐시 키 ───────────────────────────────────────────────────
        const CACHE_KEY_LANG = 'cache_lang_v2';
        const CACHE_KEY_CERT = 'cache_cert_v2';
        const CACHE_KEY_FLASH = 'cache_flash_v2';
        const CACHE_TTL = 1000 * 60 * 30;

        function saveCache(key, data) {
            try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
        }

        function loadCache(key) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return null;
                const { ts, data } = JSON.parse(raw);
                if (Date.now() - ts > CACHE_TTL) return null;
                return data;
            } catch(e) { return null; }
        }

        // ── 스켈레톤 UI ───────────────────────────────────────────────
        function showSkeleton(count = 5) {
            const container = document.getElementById('main-container');
            container.innerHTML = Array(count).fill(`
                <div class="glass-card p-6 border-l-4 border-slate-700/50 animate-pulse">
                    <div class="flex justify-between items-start mb-4">
                        <div class="h-3 w-16 bg-slate-700 rounded-full"></div>
                        <div class="h-8 w-8 bg-slate-700 rounded-xl"></div>
                    </div>
                    <div class="h-5 w-3/4 bg-slate-700 rounded-full mb-3"></div>
                    <div class="h-3 w-1/3 bg-slate-800 rounded-full"></div>
                </div>`).join('');
        }

        // ── 데이터 로드 ───────────────────────────────────────────────
        async function fetchAll() {
            const cachedLang = loadCache(CACHE_KEY_LANG);
            const cachedCert = loadCache(CACHE_KEY_CERT);
            const cachedFlash = loadCache(CACHE_KEY_FLASH);

            if (cachedLang) {
                langData = cachedLang;
                renderRandom();
            } else {
                showSkeleton(6);
            }

            if (cachedFlash) {
                flashData = cachedFlash;
            }

            try {
                const [r1, r2] = await Promise.all([
                    fetch(LANG_CSV),
                    fetch(CERT_CSV).catch(() => null)
                ]);
                const newLang = parseCSV(await r1.text());
                const newCert = r2 ? parseCSV(await r2.text()) : [];

                langData = newLang;
                certData = newCert;
                saveCache(CACHE_KEY_LANG, newLang);
                if (newCert.length > 0) saveCache(CACHE_KEY_CERT, newCert);

                if (!cachedLang) renderRandom();

            } catch(e) {
                if (!cachedLang) {
                    document.getElementById('main-container').innerHTML =
                        `<div class="text-red-400 text-sm text-center py-20">❌ CONNECTION ERROR<br><span class="text-[10px] text-slate-400">구글 시트 웹에 게시 설정 확인</span></div>`;
                }
            }
        }

        // ── 탭 전환 ───────────────────────────────────────────────────
        function switchMainTab(tab) {
            currentTab = tab;
            document.getElementById('tab-lang').classList.toggle('active', tab === 'lang');
            document.getElementById('tab-cert').classList.toggle('active', tab === 'cert');
            document.getElementById('tab-flash').classList.toggle('active', tab === 'flash');
            document.getElementById('cert-filters').classList.toggle('hidden', tab !== 'cert');
            document.getElementById('flash-controls').classList.toggle('hidden', tab !== 'flash');
            document.getElementById('upload-btn').style.display = tab === 'flash' ? 'flex' : 'none';

            if (tab === 'lang' || tab === 'cert') {
                if (tab === 'lang') currentSubject = 'ALL';
                renderRandom();
            } else if (tab === 'flash') {
                renderFlashCard();
            }
        }

        function switchSubject(subject) {
            currentSubject = subject;
            document.querySelectorAll('.sub-filter').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.subject === subject);
            });
            renderRandom();
        }

        // ── 랜덤 렌더링 ───────────────────────────────────────────────
        function renderRandom() {
            let picked = [];

            if (currentTab === 'lang') {
                LANG_TYPES.forEach(type => {
                    const pool = langData.filter(d => d.type === type);
                    if (pool.length > 0) picked.push(pool[Math.floor(Math.random() * pool.length)]);
                });
                document.getElementById('engine-status').innerText = 'SYSTEM: 🌏 LANGUAGE · RANDOM';

            } else if (currentTab === 'cert') {
                if (certData.length === 0) {
                    document.getElementById('main-container').innerHTML =
                        `<div class="text-center py-20 text-slate-500 text-sm">
                            ⏳ 자격증 데이터 로딩 중...<br>
                            <span class="text-[10px] text-slate-600">잠시 후 새로고침 해주세요</span><br><br>
                            <button onclick="fetchAll()" class="mt-2 px-4 py-2 bg-blue-600/30 text-blue-300 rounded-lg text-xs">🔄 다시 시도</button>
                        </div>`;
                    return;
                }
                if (currentSubject === 'ALL') {
                    CERT_SUBJECTS.forEach(subj => {
                        const pool = certData.filter(d => d.type === subj);
                        if (pool.length > 0) picked.push(pool[Math.floor(Math.random() * pool.length)]);
                    });
                    document.getElementById('engine-status').innerText = 'SYSTEM: 📚 ALL SUBJECTS · RANDOM';
                } else {
                    const pool = certData.filter(d => d.type === currentSubject);
                    const shuffled = [...pool].sort(() => Math.random() - 0.5);
                    picked = shuffled.slice(0, 6);
                    document.getElementById('engine-status').innerText = `SYSTEM: 📚 ${currentSubject} · RANDOM`;
                }
            }

            renderCards(picked.sort(() => Math.random() - 0.5));
        }

        // ── 카드 렌더링 ───────────────────────────────────────────────
        function renderCards(items) {
            const container = document.getElementById('main-container');
            container.innerHTML = '';
            if (items.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-500">표시할 데이터가 없습니다.</div>`;
                return;
            }

            items.forEach(item => {
                const isBookmarked = bookmarks.some(b => b.text === item.text);
                const card = document.createElement('div');
                card.className = `glass-card p-6 border-l-4 border-${item.color}-500/50`;

                const header = document.createElement('div');
                header.className = 'flex justify-between items-start mb-4';
                const typeLabel = document.createElement('span');
                typeLabel.className = `text-[10px] font-black tracking-widest text-${item.color}-400 uppercase`;
                typeLabel.textContent = item.type;
                const btnGroup = document.createElement('div');
                btnGroup.className = 'flex gap-2 items-center';

                const bookmarkBtn = document.createElement('button');
                bookmarkBtn.className = `w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center ${isBookmarked ? 'bookmark-active' : 'text-slate-500'}`;
                bookmarkBtn.innerHTML = `<i class="fa-solid fa-star text-xs"></i>`;
                bookmarkBtn.addEventListener('click', () => toggleBookmark(item, bookmarkBtn));

                if (item.type === 'KANJI') {
                    [
                        { label: '음·훈', code: 'ko-KR', bg: 'bg-slate-700', text: 'text-slate-300' },
                        { label: '中', code: 'zh-CN', bg: 'bg-red-900/30', text: 'text-red-400' },
                        { label: '日', code: 'ja-JP', bg: 'bg-emerald-900/30', text: 'text-emerald-400' }
                    ].forEach(l => {
                        const b = document.createElement('button');
                        b.className = `voice-btn ${l.bg} ${l.text} px-2 py-1 rounded-lg text-[10px] font-bold`;
                        b.textContent = l.label;
                        b.addEventListener('click', () => handleSpeak(item.text, l.code));
                        btnGroup.appendChild(b);
                    });
                } else if (item.type === 'ENGLISH') {
                    const usBtn = document.createElement('button');
                    usBtn.className = 'voice-btn bg-blue-900/30 text-blue-400 px-2 py-1 rounded-lg text-[10px] font-bold';
                    usBtn.textContent = '🇺🇸 US';
                    usBtn.addEventListener('click', () => handleSpeak(item.text, 'en-US'));
                    btnGroup.appendChild(usBtn);

                    const ukBtn = document.createElement('button');
                    ukBtn.className = 'voice-btn bg-indigo-900/30 text-indigo-400 px-2 py-1 rounded-lg text-[10px] font-bold';
                    ukBtn.textContent = '🇬🇧 UK';
                    let pressTimer = null, isLongPress = false;
                    ukBtn.addEventListener('pointerdown', () => {
                        isLongPress = false;
                        pressTimer = setTimeout(() => {
                            isLongPress = true;
                            ukBtn.closest('.glass-card').querySelector('.uk-panel')?.classList.toggle('open');
                        }, 500);
                    });
                    ukBtn.addEventListener('pointerup', () => { clearTimeout(pressTimer); if (!isLongPress) handleSpeakCustom(item.text, 'en-GB', 0.85, 0.9); });
                    ukBtn.addEventListener('pointerleave', () => clearTimeout(pressTimer));
                    btnGroup.appendChild(ukBtn);
                } else {
                    const speakBtn = document.createElement('button');
                    speakBtn.className = `w-10 h-10 rounded-xl bg-${item.color}-500/20 text-${item.color}-400 flex items-center justify-center active:scale-90 transition-transform`;
                    speakBtn.innerHTML = `<i class="fa-solid fa-play"></i>`;
                    speakBtn.addEventListener('click', () => handleSpeak(item.text, item.lang));
                    btnGroup.appendChild(speakBtn);
                }

                btnGroup.appendChild(bookmarkBtn);
                header.appendChild(typeLabel);
                header.appendChild(btnGroup);

                const textP = document.createElement('p');
                textP.className = 'text-lg font-bold leading-tight mb-3 tracking-tight text-white/90';
                textP.textContent = `"${item.text}"`;

                const subP = document.createElement('p');
                subP.className = 'text-[11px] text-slate-500 font-medium leading-relaxed cursor-pointer select-none';
                subP.textContent = '💡 HINT';
                let revealed = false;
                subP.addEventListener('click', () => {
                    revealed = !revealed;
                    subP.textContent = revealed ? item.sub : '💡 HINT';
                    subP.className = revealed
                        ? 'text-[11px] text-slate-400 font-medium leading-relaxed cursor-pointer select-none'
                        : 'text-[11px] text-slate-500 font-medium leading-relaxed cursor-pointer select-none';
                });

                let ukPanel = null;
                if (item.type === 'ENGLISH') {
                    ukPanel = document.createElement('div');
                    ukPanel.className = 'uk-panel mt-3 px-1';
                    ukPanel.innerHTML = `
                        <div class="bg-indigo-950/50 border border-indigo-500/20 rounded-xl p-3 space-y-2">
                            <div class="flex items-center justify-between">
                                <span class="text-[10px] text-indigo-300 font-bold">🇬🇧 UK 음성 조절</span>
                                <button class="uk-play-btn text-[10px] bg-indigo-500/30 text-indigo-300 px-2 py-1 rounded-lg font-bold">▶ 재생</button>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] text-slate-400 w-8">속도</span>
                                <input type="range" class="uk-rate flex-1" min="0.5" max="1.5" step="0.05" value="0.85">
                                <span class="uk-rate-val text-[10px] text-indigo-300 w-8 text-right">0.85</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] text-slate-400 w-8">높이</span>
                                <input type="range" class="uk-pitch flex-1" min="0.5" max="2.0" step="0.05" value="0.9">
                                <span class="uk-pitch-val text-[10px] text-indigo-300 w-8 text-right">0.9</span>
                            </div>
                        </div>`;
                    const ri = ukPanel.querySelector('.uk-rate'), pi = ukPanel.querySelector('.uk-pitch');
                    const rv = ukPanel.querySelector('.uk-rate-val'), pv = ukPanel.querySelector('.uk-pitch-val');
                    ri.addEventListener('input', () => rv.textContent = parseFloat(ri.value).toFixed(2));
                    pi.addEventListener('input', () => pv.textContent = parseFloat(pi.value).toFixed(2));
                    ukPanel.querySelector('.uk-play-btn').addEventListener('click', () =>
                        handleSpeakCustom(item.text, 'en-GB', parseFloat(ri.value), parseFloat(pi.value)));
                }

                card.appendChild(header);
                card.appendChild(textP);
                card.appendChild(subP);
                if (ukPanel) card.appendChild(ukPanel);
                container.appendChild(card);
            });
        }

        // ── 플래시카드 함수 ───────────────────────────────────────────
        function renderFlashCard() {
            const container = document.getElementById('main-container');
            
            if (flashData.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 text-slate-500 text-sm">
                        📁 플래시카드 CSV를 업로드해주세요<br>
                        <span class="text-xs text-slate-600">우측 상단 📁 버튼 클릭</span>
                    </div>`;
                return;
            }

            const card = flashData[flashCurrentIndex];
            const isFlipped = document.querySelector('.flashcard')?.classList.contains('flipped') || false;

            container.innerHTML = `
                <div class="flashcard-container px-6" style="min-height: 50vh; display: flex; flex-direction: column; justify-content: center;">
                    <div class="flashcard ${isFlipped ? 'flipped' : ''}" onclick="toggleFlashCard()">
                        <div class="flashcard-front">
                            <div class="text-slate-400 text-xs mb-6 font-mono tracking-widest">QUESTION</div>
                            <p class="text-xl font-bold text-white mb-6 leading-relaxed">${card.front}</p>
                            <div class="text-slate-500 text-xs mt-6">클릭하여 정답 확인 →</div>
                        </div>
                        <div class="flashcard-back">
                            <div class="text-slate-400 text-xs mb-6 font-mono tracking-widest">ANSWER</div>
                            <p class="text-xl font-bold text-green-300 mb-6 leading-relaxed">${card.back}</p>
                            <div class="text-slate-500 text-xs mt-6">← 클릭하여 돌아가기</div>
                        </div>
                    </div>
                </div>

                <div class="px-6 mt-8 space-y-3">
                    <div class="flex gap-2 justify-center">
                        <button onclick="markFlashReview(false)" class="px-4 py-2 bg-red-900/30 text-red-400 rounded-lg text-sm font-bold hover:bg-red-900/50 transition">
                            ✗ 틀림
                        </button>
                        <button onclick="markFlashReview(true)" class="px-4 py-2 bg-green-900/30 text-green-400 rounded-lg text-sm font-bold hover:bg-green-900/50 transition">
                            ✓ 맞음
                        </button>
                    </div>
                    <div class="text-center text-xs text-slate-500">
                        카테고리: <span class="text-slate-400">${card.category}</span>
                    </div>
                </div>`;

            updateFlashProgress();
        }

        function toggleFlashCard() {
            const card = document.querySelector('.flashcard');
            if (card) card.classList.toggle('flipped');
        }

        function nextFlashCard() {
            if (flashCurrentIndex < flashData.length - 1) {
                flashCurrentIndex++;
                renderFlashCard();
            } else {
                showFlashSummary();
            }
        }

        function prevFlashCard() {
            if (flashCurrentIndex > 0) {
                flashCurrentIndex--;
                renderFlashCard();
            }
        }

        function markFlashReview(isCorrect) {
            const cardId = flashData[flashCurrentIndex].id;
            flashReviewedCards.add(cardId);
            if (isCorrect) {
                flashCorrectCards.add(cardId);
            } else {
                flashCorrectCards.delete(cardId);
            }
            nextFlashCard();
        }

        function updateFlashProgress() {
            document.getElementById('flash-progress').textContent = flashCurrentIndex + 1;
            document.getElementById('flash-total').textContent = flashData.length;
        }

        function showFlashSummary() {
            const total = flashData.length;
            const correct = flashCorrectCards.size;
            const percentage = Math.round((correct / total) * 100);

            document.getElementById('main-container').innerHTML = `
                <div class="px-6 pt-10 space-y-6">
                    <div class="text-center">
                        <h2 class="text-3xl font-bold text-white mb-2">학습 완료! 🎉</h2>
                        <p class="text-slate-500">총 ${total}개 카드</p>
                    </div>

                    <div class="glass-card p-6 space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-slate-300">맞은 문제</span>
                            <span class="text-2xl font-bold text-green-400">${correct}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-300">틀린 문제</span>
                            <span class="text-2xl font-bold text-red-400">${total - correct}</span>
                        </div>
                        <div class="w-full bg-slate-700/50 rounded-full h-4 overflow-hidden mt-4">
                            <div class="bg-gradient-to-r from-green-500 to-emerald-500 h-full transition-all duration-500" style="width: ${percentage}%"></div>
                        </div>
                        <div class="text-center">
                            <p class="text-4xl font-bold text-white">${percentage}%</p>
                            <p class="text-slate-500 text-sm mt-1">정답률</p>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="resetFlashCard()" class="flex-1 px-4 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition">
                            🔄 다시 시작
                        </button>
                        <button onclick="switchMainTab('lang')" class="flex-1 px-4 py-3 bg-slate-700 text-slate-300 rounded-lg font-bold hover:bg-slate-600 transition">
                            다른 탭
                        </button>
                    </div>
                </div>`;
        }

        function resetFlashCard() {
            flashCurrentIndex = 0;
            flashReviewedCards.clear();
            flashCorrectCards.clear();
            renderFlashCard();
        }

        // ── CSV 업로드 ────────────────────────────────────────────────
        function openUploadModal() {
            document.getElementById('uploadModal').classList.add('show');
            setupDragDrop();
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('show');
            pendingCSVData = null;
            document.getElementById('csvInput').value = '';
            document.getElementById('uploadArea').innerHTML = `
                <i class="fa-solid fa-cloud-arrow-up text-3xl text-indigo-400 mb-2 block"></i>
                <p class="text-sm font-bold mb-1">CSV 파일을 드래그하거나 클릭</p>
                <p class="text-xs text-slate-400">최대 5MB</p>`;
        }

        function setupDragDrop() {
            const area = document.getElementById('uploadArea');
            area.addEventListener('click', () => document.getElementById('csvInput').click());
            area.addEventListener('dragover', (e) => { e.preventDefault(); area.classList.add('dragover'); });
            area.addEventListener('dragleave', () => area.classList.remove('dragover'));
            area.addEventListener('drop', (e) => { e.preventDefault(); area.classList.remove('dragover'); handleFileSelect({target: {files: e.dataTransfer.files}}); });
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                pendingCSVData = e.target.result;
                document.getElementById('uploadArea').innerHTML = `✅ <strong>${file.name}</strong> 준비됨`;
            };
            reader.readAsText(file);
        }

        function confirmUpload() {
            if (!pendingCSVData) { alert('파일을 선택해주세요'); return; }
            const parsed = parseFlashCSV(pendingCSVData);
            if (parsed.length === 0) { alert('유효한 데이터가 없습니다'); return; }

            flashData = parsed;
            saveCache(CACHE_KEY_FLASH, flashData);
            flashCurrentIndex = 0;
            flashReviewedCards.clear();
            flashCorrectCards.clear();
            alert(`✅ ${parsed.length}개 카드가 추가되었습니다!`);
            closeUploadModal();
            renderFlashCard();
        }

        // ── 북마크 ────────────────────────────────────────────────────
        function toggleBookmark(item, btn) {
            const index = bookmarks.findIndex(b => b.text === item.text);
            if (index > -1) { bookmarks.splice(index, 1); btn.classList.remove('bookmark-active'); btn.classList.add('text-slate-500'); }
            else { bookmarks.push(item); btn.classList.add('bookmark-active'); btn.classList.remove('text-slate-500'); }
            localStorage.setItem('bookmarks_v2', JSON.stringify(bookmarks));
        }

        function toggleBookmarkView() {
            if (bookmarks.length === 0) { alert("저장된 카드가 없습니다!"); return; }
            document.getElementById('engine-status').innerText = 'SYSTEM: ⭐ BOOKMARKS';
            renderCards(bookmarks);
        }

        fetchAll();
    </script>
</body>
</html>
