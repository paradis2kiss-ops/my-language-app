<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Master Engine V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; transition: all 0.3s ease; }
        .bookmark-active { color: #facc15 !important; }
        #loader { display: flex; align-items: center; justify-content: center; min-height: 50vh; }
    </style>
</head>
<body class="pb-32">
    <header class="p-8 pt-12 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tighter italic uppercase">2026 Master <span class="text-blue-400">V2</span></h1>
            <p id="engine-status" class="text-slate-500 text-xs mt-2 font-mono tracking-widest">SYSTEM: CLOUD SYNCED</p>
        </div>
        <button onclick="toggleBookmarkView()" class="w-12 h-12 bg-slate-800/50 rounded-2xl text-yellow-400 border border-white/10 flex items-center justify-center shadow-lg">
            <i class="fa-solid fa-star"></i>
        </button>
    </header>

    <main id="main-container" class="px-6 space-y-6">
        <div id="loader" class="text-slate-600 font-bold tracking-[0.2em] animate-pulse">SYNCING CLOUD DATA...</div>
    </main>

    <button onclick="location.reload()" class="fixed bottom-10 right-6 w-16 h-16 bg-blue-600 rounded-full shadow-[0_0_20px_rgba(37,99,235,0.4)] flex items-center justify-center active:rotate-180 transition duration-500 z-50">
        <i class="fa-solid fa-rotate text-white text-2xl"></i>
    </button>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5bBv7_SonmFxuArnlAaaie8EHDS4Px6ZF1uY3q1Mqcbgfgac-4V7D0CxSVwCOy4zQXog3FT8QzKpj/pub?output=csv';

        let allData = [];
        let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');

        // ✅ CSV 파서: 따옴표 안 쉼표 무시
        function parseCSVRow(row) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < row.length; i++) {
                const ch = row[i];
                if (ch === '"') {
                    if (inQuotes && row[i + 1] === '"') { current += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (ch === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += ch;
                }
            }
            result.push(current.trim());
            return result;
        }

        // ✅ 텍스트 정리: **마크다운**, 앞뒤 """ 제거
        function cleanText(str) {
            if (!str) return '';
            return str
                .replace(/\*\*(.*?)\*\*/g, '$1')
                .replace(/^"+|"+$/g, '')
                .trim();
        }

        // ✅ 음성 목록 캐싱 (비동기 문제 해결)
        let cachedVoices = [];
        function loadVoices() {
            const v = window.speechSynthesis.getVoices();
            if (v.length > 0) cachedVoices = v;
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        // ✅ 음성 엔진: 확인된 음성 목록 기반 최적화
        function handleSpeak(text, lang) {
            window.speechSynthesis.cancel();
            const voices = cachedVoices.length > 0 ? cachedVoices : window.speechSynthesis.getVoices();
            const utterance = new SpeechSynthesisUtterance(text);
            const l = (lang || 'ko-KR').trim();

            let voice = null;

            if (l.startsWith('en')) {
                if (l === 'en-GB') {
                    // ACTING용: Google UK English Female 우선
                    voice = voices.find(v => v.name === 'Google UK English Female')
                          || voices.find(v => v.lang === 'en-GB');
                } else {
                    voice = voices.find(v => v.name === 'Google US English')
                          || voices.find(v => v.lang === 'en-US');
                }
                utterance.rate = 0.85;
                utterance.pitch = 0.9;

            } else if (l.startsWith('ja')) {
                // Google 日本語만 존재 - rate/pitch 최대한 자연스럽게
                voice = voices.find(v => v.name === 'Google 日本語')
                      || voices.find(v => v.lang === 'ja-JP');
                utterance.rate = 0.78;  // 천천히 = 더 또렷하게
                utterance.pitch = 1.05; // 약간 높게 = 여성 느낌

            } else if (l.startsWith('zh')) {
                // 보통화 우선
                voice = voices.find(v => v.name === 'Google 普通话（中国大陆）')
                      || voices.find(v => v.lang === 'zh-CN');
                utterance.rate = 0.82;
                utterance.pitch = 1.0;

            } else {
                // 한국어: Google 우선, 없으면 Microsoft Heami
                voice = voices.find(v => v.name === 'Google 한국의')
                      || voices.find(v => v.name === 'Microsoft Heami')
                      || voices.find(v => v.lang === 'ko-KR');
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
            }

            if (voice) utterance.voice = voice;
            utterance.lang = voice ? voice.lang : l;
            utterance.onerror = (e) => console.error('TTS Error:', e.error, '|', lang, '|', text);
            window.speechSynthesis.speak(utterance);
        }

        // [데이터 로드]
        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error('fetch failed');
                const csvData = await response.text();

                const rows = csvData.split('\n').slice(1);
                allData = rows
                    .map(row => {
                        if (!row.trim()) return null;
                        const cols = parseCSVRow(row);
                        return {
                            type:  cleanText(cols[0]) || 'INFO',
                            text:  cleanText(cols[1]) || '',
                            sub:   cleanText(cols[2]) || '',
                            lang:  (cols[3] || 'ko-KR').trim(),
                            color: (cols[4] || 'blue').trim()
                        };
                    })
                    .filter(item => item && item.text !== '');

                renderRandom();
            } catch (e) {
                console.error('Fetch error:', e);
                document.getElementById('loader').innerHTML =
                    `<div class="text-red-400 text-sm text-center">
                        ❌ CONNECTION ERROR<br>
                        <span class="text-[10px] text-slate-400">구글 시트 → 파일 → 웹에 게시(CSV) 확인</span>
                    </div>`;
            }
        }

        function renderRandom() {
            const shuffled = [...allData].sort(() => Math.random() - 0.5);
            document.getElementById('engine-status').innerText = "SYSTEM: RANDOM MODE";
            renderCards(shuffled.slice(0, 4));
        }

        // ✅ 카드 렌더링: innerHTML 대신 addEventListener 사용 (특수문자 onclick 파괴 방지)
        function renderCards(items) {
            const container = document.getElementById('main-container');
            container.innerHTML = '';

            if (items.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-500">표시할 데이터가 없습니다.</div>`;
                return;
            }

            items.forEach(item => {
                const isBookmarked = bookmarks.some(b => b.text === item.text);

                const card = document.createElement('div');
                card.className = `glass-card p-6 border-l-4 border-${item.color}-500/50 relative`;

                // 헤더
                const header = document.createElement('div');
                header.className = 'flex justify-between items-start mb-4';

                const typeLabel = document.createElement('span');
                typeLabel.className = `text-[10px] font-black tracking-widest text-${item.color}-400 uppercase`;
                typeLabel.textContent = item.type;

                const btnGroup = document.createElement('div');
                btnGroup.className = 'flex space-x-2';

                // 북마크 버튼
                const bookmarkBtn = document.createElement('button');
                bookmarkBtn.className = `w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center ${isBookmarked ? 'bookmark-active' : 'text-slate-500'}`;
                bookmarkBtn.innerHTML = `<i class="fa-solid fa-star text-xs"></i>`;
                bookmarkBtn.addEventListener('click', () => toggleBookmark(item, bookmarkBtn));

                // 음성 버튼
                const speakBtn = document.createElement('button');
                speakBtn.className = `w-10 h-10 rounded-xl bg-${item.color}-500/20 text-${item.color}-400 flex items-center justify-center active:scale-90 transition-transform`;
                speakBtn.innerHTML = `<i class="fa-solid fa-play"></i>`;
                speakBtn.addEventListener('click', () => handleSpeak(item.text, item.lang));

                btnGroup.appendChild(bookmarkBtn);
                btnGroup.appendChild(speakBtn);
                header.appendChild(typeLabel);
                header.appendChild(btnGroup);

                // 텍스트
                const textP = document.createElement('p');
                textP.className = 'text-lg font-bold leading-tight mb-3 tracking-tight text-white/90';
                textP.textContent = `"${item.text}"`;

                // 서브텍스트
                const subP = document.createElement('p');
                subP.className = 'text-[11px] text-slate-400 font-medium leading-relaxed';
                subP.textContent = item.sub;

                card.appendChild(header);
                card.appendChild(textP);
                card.appendChild(subP);
                container.appendChild(card);
            });
        }

        function toggleBookmark(item, btn) {
            const index = bookmarks.findIndex(b => b.text === item.text);
            if (index > -1) {
                bookmarks.splice(index, 1);
                btn.classList.remove('bookmark-active');
                btn.classList.add('text-slate-500');
            } else {
                bookmarks.push(item);
                btn.classList.add('bookmark-active');
                btn.classList.remove('text-slate-500');
            }
            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
        }

        function toggleBookmarkView() {
            if (bookmarks.length === 0) { alert("저장된 문장이 없습니다!"); return; }
            document.getElementById('engine-status').innerText = "SYSTEM: BOOKMARKS";
            renderCards(bookmarks);
        }

        fetchSheetData();
    </script>
</body>
</html>
