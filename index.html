<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Master Cloud Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; transition: transform 0.2s; }
    </style>
</head>
<body class="pb-24">
    <header class="p-8 pt-12">
        <h1 class="text-3xl font-extrabold tracking-tighter italic">2026 Master <span class="text-blue-400">Cloud</span></h1>
        <p class="text-slate-500 text-xs mt-2 font-mono" id="engine-status">CONNECTED TO GOOGLE SHEETS</p>
    </header>

    <main id="main-container" class="px-6 space-y-6">
        <div id="loader" class="text-center py-20 text-slate-600 font-bold tracking-widest animate-pulse">FETCHING CLOUD DATA...</div>
    </main>

    <button onclick="location.reload()" class="fixed bottom-28 right-6 w-14 h-14 bg-blue-600 rounded-full shadow-2xl flex items-center justify-center active:rotate-180 transition duration-500">
        <i class="fa-solid fa-rotate text-white text-xl"></i>
    </button>

    <script>
        // 여기에 구글 시트에서 복사한 CSV URL을 넣으세요!
        const SHEET_CSV_URL = '여기에_복사한_URL을_붙여넣으세요';

        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1); // 헤더 제외

                const db = rows.map(row => {
                    const [type, text, sub, lang, color] = row.split(',');
                    return { type, text, sub, lang, color: color?.trim() || 'slate' };
                }).filter(item => item.text); // 빈 줄 방지

                // 셔플 알고리즘
                db.sort(() => Math.random() - 0.5);

                const container = document.getElementById('main-container');
                container.innerHTML = ''; 

                db.slice(0, 4).forEach(item => {
                    const card = document.createElement('div');
                    card.className = `glass-card p-6 border-l-4 border-${item.color}-500/50`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] font-black tracking-widest text-${item.color}-400 uppercase">${item.type}</span>
                            <button onclick="speak(\`${item.text}\`, '${item.lang}')" class="w-10 h-10 rounded-xl bg-${item.color}-500/20 text-${item.color}-400 flex items-center justify-center">
                                <i class="fa-solid fa-play"></i>
                            </button>
                        </div>
                        <p class="text-lg font-bold leading-tight mb-2 tracking-tight">"${item.text}"</p>
                        <p class="text-[11px] text-slate-500 font-medium">${item.sub}</p>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('loader').innerText = "CONFIG ERROR: CHECK SHEET URL";
            }
        }

        function speak(text, lang) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        fetchSheetData();
    </script>
</body>
</html>
