<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Master Engine V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; transition: all 0.3s ease; }
        .bookmark-active { color: #facc15 !important; }
        #loader { display: flex; align-items: center; justify-content: center; min-height: 50vh; }
    </style>
</head>
<body class="pb-32">
    <header class="p-8 pt-12 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tighter italic uppercase">2026 Master <span class="text-blue-400">V2</span></h1>
            <p id="engine-status" class="text-slate-500 text-xs mt-2 font-mono tracking-widest">SYSTEM: CLOUD SYNCED</p>
        </div>
        <button onclick="toggleBookmarkView()" class="w-12 h-12 bg-slate-800/50 rounded-2xl text-yellow-400 border border-white/10 flex items-center justify-center shadow-lg">
            <i class="fa-solid fa-star"></i>
        </button>
    </header>

    <main id="main-container" class="px-6 space-y-6">
        <div id="loader" class="text-slate-600 font-bold tracking-[0.2em] animate-pulse">SYNCING CLOUD DATA...</div>
    </main>

    <button onclick="location.reload()" class="fixed bottom-10 right-6 w-16 h-16 bg-blue-600 rounded-full shadow-[0_0_20px_rgba(37,99,235,0.4)] flex items-center justify-center active:rotate-180 transition duration-500 z-50">
        <i class="fa-solid fa-rotate text-white text-2xl"></i>
    </button>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5bBv7_SonmFxuArnlAaaie8EHDS4Px6ZF1uY3q1Mqcbgfgac-4V7D0CxSVwCOy4zQXog3FT8QzKpj/pub?output=csv';

        let allData = [];
        let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');

        // ✅ 수정1: 쉼표 포함 셀 처리하는 CSV 파서
        function parseCSVRow(row) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < row.length; i++) {
                const ch = row[i];
                if (ch === '"') {
                    if (inQuotes && row[i + 1] === '"') { current += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (ch === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += ch;
                }
            }
            result.push(current.trim());
            return result;
        }

        // ✅ 수정2: 음성 목록 미리 로드 (비동기 문제 해결)
        let voicesReady = false;
        let cachedVoices = [];

        function loadVoices() {
            cachedVoices = window.speechSynthesis.getVoices();
            if (cachedVoices.length > 0) voicesReady = true;
        }
        window.speechSynthesis.onvoiceschanged = () => { loadVoices(); };
        loadVoices();

        // ✅ 수정3: 음성 엔진 - lang값 유연하게 처리
        function handleSpeak(text, lang) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = cachedVoices.length > 0 ? cachedVoices : window.speechSynthesis.getVoices();

            const langLower = (lang || '').toLowerCase().trim();

            if (langLower.startsWith('en')) {
                // 영어: en, en-US, en-GB, english 모두 처리
                const targetLang = langLower === 'en-gb' ? 'en-GB' : 'en-US';
                const preferred = voices.find(v => v.lang === targetLang && v.name.toLowerCase().includes('female'))
                                || voices.find(v => v.lang === targetLang)
                                || voices.find(v => v.lang.startsWith('en'));
                if (preferred) utterance.voice = preferred;
                utterance.lang = targetLang;
                utterance.rate = 0.85;
                utterance.pitch = 0.95;
            } else if (langLower.startsWith('ko') || langLower === '') {
                // 한국어 또는 lang 없음
                const koVoice = voices.find(v => v.lang === 'ko-KR');
                if (koVoice) utterance.voice = koVoice;
                utterance.lang = 'ko-KR';
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
            } else {
                // 기타 언어 그대로 사용
                utterance.lang = lang;
                utterance.rate = 0.9;
            }

            utterance.onerror = (e) => console.error('Speech error:', e.error, '| lang:', lang, '| text:', text);
            window.speechSynthesis.speak(utterance);
        }

        // [데이터 로드]
        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const csvData = await response.text();

                const rows = csvData.split('\n').slice(1);
                allData = rows
                    .map(row => {
                        const cols = parseCSVRow(row); // ✅ 수정된 파서 사용
                        return {
                            type:  cols[0] || '',
                            text:  cols[1] || '',
                            sub:   cols[2] || '',
                            lang:  cols[3] || 'en-US',
                            color: cols[4] || 'blue'
                        };
                    })
                    .filter(item => item.text !== '');

                renderRandom();
            } catch (e) {
                console.error('Fetch error:', e);
                document.getElementById('loader').innerHTML =
                    `<div class="text-red-400 text-sm text-center">
                        ❌ CONNECTION ERROR<br>
                        <span class="text-[10px] text-slate-500">구글 시트 → 파일 → 웹에 게시(CSV) 설정 확인</span>
                    </div>`;
            }
        }

        // [렌더링] 무작위 4개
        function renderRandom() {
            const shuffled = [...allData].sort(() => Math.random() - 0.5);
            document.getElementById('engine-status').innerText = "SYSTEM: RANDOM MODE";
            renderCards(shuffled.slice(0, 4));
        }

        // [카드 생성 UI]
        function renderCards(items) {
            const container = document.getElementById('main-container');
            container.innerHTML = '';

            if (items.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-500">표시할 데이터가 없습니다.</div>`;
                return;
            }

            items.forEach((item, idx) => {
                const isBookmarked = bookmarks.some(b => b.text === item.text);
                const safeItem = encodeURIComponent(JSON.stringify(item));
                // 텍스트 내 백틱/따옴표 이스케이프
                const safeText = item.text.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/'/g, "\\'");

                const card = document.createElement('div');
                card.className = `glass-card p-6 border-l-4 border-${item.color}-500/50 relative`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black tracking-widest text-${item.color}-400 uppercase">${item.type}</span>
                        <div class="flex space-x-2">
                            <button onclick="toggleBookmark('${safeItem}', this)"
                                class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center ${isBookmarked ? 'bookmark-active' : 'text-slate-500'}">
                                <i class="fa-solid fa-star text-xs"></i>
                            </button>
                            <button onclick="handleSpeak('${safeText}', '${item.lang}')"
                                class="w-10 h-10 rounded-xl bg-${item.color}-500/20 text-${item.color}-400 flex items-center justify-center active:scale-90 transition-transform">
                                <i class="fa-solid fa-play"></i>
                            </button>
                        </div>
                    </div>
                    <p class="text-lg font-bold leading-tight mb-3 tracking-tight text-white/90">"${item.text}"</p>
                    <p class="text-[11px] text-slate-400 font-medium leading-relaxed">${item.sub}</p>
                `;
                container.appendChild(card);
            });
        }

        // [북마크 로직]
        function toggleBookmark(itemStr, btn) {
            const item = JSON.parse(decodeURIComponent(itemStr));
            const index = bookmarks.findIndex(b => b.text === item.text);
            if (index > -1) {
                bookmarks.splice(index, 1);
                btn.classList.remove('bookmark-active');
                btn.classList.add('text-slate-500');
            } else {
                bookmarks.push(item);
                btn.classList.add('bookmark-active');
                btn.classList.remove('text-slate-500');
            }
            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
        }

        function toggleBookmarkView() {
            if (bookmarks.length === 0) { alert("저장된 문장이 없습니다!"); return; }
            document.getElementById('engine-status').innerText = "SYSTEM: BOOKMARKS";
            renderCards(bookmarks);
        }

        // 초기 실행
        fetchSheetData();
    </script>
</body>
</html>
